name: Build and Release

on:
  push:
   branches:
     - main
      
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 需要写入Release的权限

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整提交历史用于版本检测
        repository: c61292558/WingHexExplorer2
        token: ${{ secrets.GITHUB_TOKEN }}  # 显式传递自动生成的令牌
        
    - name: Checkout submodules
      run: |
        git submodule update --init --recursive

    - name: List files
      run: ls -la
      
    - name: Setup Docker
      run: |
        sudo systemctl start docker
        sudo docker info

    - name: Build Docker container
      run: |
        sudo docker run -dit \
          --name qtbuilder \
          -v ${{ github.workspace }}:/workspace \
          linuxdeepin/apricot
    
    - name: Check CMakeLists.txt in container
      run: 
        sudo docker exec qtbuilder ls -la /workspace/CMakeLists.txt
    
    - name: Install dependencies
      run: |
        sudo docker exec qtbuilder bash -c "apt update && \
          apt install -y  cmake qtbase5-dev qt5-default qttools5-dev qttools5-dev-tools  build-essential git && \
          apt clean"

    - name: Compile project
      run: |
        sudo docker exec qtbuilder bash -c "cd /workspace && \
        mkdir -p build && \
        cd build && \
        cmake .. && \   # 生成 Makefile
        make -j$(nproc)" # 编译

    - name: Get version info
      id: version
      run: |
        # 提取最新的tag作为版本号
        VERSION=$(git describe --tags --abbrev=0)
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}   # 添加此行
        tag_name: ${{ steps.version.outputs.version }}
        name: "Release ${{ steps.version.outputs.version }}"
        draft: false
        prerelease: false
        files: |
          build/*.app    # 应用程序文件
          build/*.so     # 动态库文件
          build/*.dmg    # macOS安装包
          build/*.exe    # Windows可执行文件
